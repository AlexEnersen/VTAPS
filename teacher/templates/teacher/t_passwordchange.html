{% extends "t_base.html" %} {% block content %} {% load static %}
<div class="deleteWarningContainer">
  <p class="deleteWarning">
    Enter your email and a password change form will be sent.
  </p>
  <form
    action=""
    method="post"
    class="changePasswordContainer"
  >
    {% csrf_token %}
    {{passwordChangeForm}}
    <input type="submit" value="Send Email" class="continueButton" />
  </form>
</div>
{% endblock %}
