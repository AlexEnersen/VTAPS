{% extends "t_base.html" %} {% block content %}
<div class="accountAuth">
    <h2 class="accountHeader">Teacher Login</h2>
    <form method="POST" class="authForm">
        {% csrf_token %}
        {{form}}
        <button type="submit" class="loginButton">Login</button>
    </form>
    <div class="backRow">
        <a href="/teacher" class="backText">Back</a>
        <a href="/teacher/changeTeacherPassword" class="backText">Forgot Password?</a>
    </div>
    {% endblock %}
</div>
